name: Build and Publish

on:
  push:
    branches: [ "1.21.11" ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew clean build

      - name: Upload Artifacts (For Testing)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: R3CT-Daily-Quests-Builds
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar

      - name: Publish Fabric to Modrinth and CurseForge
        if: github.event_name == 'release'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: '4NTCjyNQ'
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: '1508573'
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
          loaders: fabric
          game-versions: 1.21.11

          dependencies: |
            fabric-api(required)
            cloth-config(required)
            modmenu(optional)

          version: ${{ github.event.release.tag_name }}-fabric
          changelog: ${{ github.event.release.body }}

      - name: Publish NeoForge to Modrinth and CurseForge
        if: github.event_name == 'release'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: '4NTCjyNQ'
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: '1508573'
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          loaders: neoforge
          game-versions: 1.21.11

          dependencies: |
            cloth-config(required)

          version: ${{ github.event.release.tag_name }}-neoforge
          changelog: ${{ github.event.release.body }}